<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <form class="regForm">

        <h1 class="satauri">User Registration Form</h1>

        <div class="flexer">
            <label class="reglabel" for="username">Username <span class="redspan">*</span> </label>
            <input type="text" placeholder="Enter your username">
        </div>

        <div class="flexer">
            <label class="reglabel" for="firstname">First Name <span class="redspan">*</span> </label>
            <input type="text" placeholder="Enter your firstname">
        </div>

        <div class="flexer">
            <label class="reglabel" for="lastname">Last Name <span class="redspan">*</span> </label>
            <input type="text" placeholder="Enter your Last">
        </div>

        <div class="flexer">
            <label class="reglabel" for="password">Password <span class="redspan">*</span> </label>
            <input type="password">
        </div>

        <div class="flexer">
            <label class="reglabel" for="confirmpassword">Confirm Password <span class="redspan">*</span> </label>
            <input type="password">
        </div>

        <div class="flexer">
            <label class="reglabel" for="cars">Choose your gender</label>

            <select>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>


        <input class="submitbutton" type="submit" value="Registration">

    </form>
</body>

</html>
